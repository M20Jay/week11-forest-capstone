name: CI/CD — Deforestation Risk Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests (CI)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pandas numpy scikit-learn joblib lightgbm xgboost pyarrow

    - name: Run pytest
      run: |
        pytest tests/ -v --tb=short

  deploy:
    name: Deploy to EC2 (CD)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ~/projects/week11-forest-capstone
          git pull origin main
          source venv/bin/activate
          sudo systemctl restart deforestation-api
          sudo systemctl status deforestation-api --no-pager
