
services:
  deforestation_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deforestation_api
    ports:
      - "8004:8000"
    volumes:
      - ./outputs:/app/outputs
      - ./src:/app/src
    environment:
      - DB_HOST=localhost
      - DB_PORT=5432
      - DB_NAME=mlops
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    restart: unless-stopped
